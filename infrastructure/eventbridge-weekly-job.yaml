AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge rules for weekly job Lambda execution (selection & delivery)'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  LambdaFunctionArn:
    Type: String
    Description: ARN of the Lambda function (e.g., arn:aws:lambda:us-west-2:ACCOUNT:function:covey-weekly-spot-dev)

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'Lambda Configuration'
        Parameters:
          - LambdaFunctionArn

Resources:
  # ============================================
  # Shared IAM Role: EventBridge → Lambda
  # ============================================

  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'covey-eventbridge-invoke-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Ref LambdaFunctionArn

  # ============================================
  # EventBridge Rule: Thursday Selection Job
  # ============================================

  WeeklySelectionRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'covey-weekly-selection-${Environment}'
      Description: 'Weekly venue selection job (Thursday 9 PM EST)'
      ScheduleExpression: 'cron(0 2 ? * FRI *)'
      State: ENABLED
      Targets:
        - Arn: !Ref LambdaFunctionArn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn
          Id: WeeklySelectionTarget
          Input: '{"triggerType":"WEEKLY_SELECTION"}'
          RetryPolicy:
            MaximumEventAgeInSeconds: 3600
            MaximumRetryAttempts: 2

  WeeklySelectionLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunctionArn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WeeklySelectionRule.Arn

  # ============================================
  # EventBridge Rule: Friday Delivery Job
  # ============================================

  NotificationDeliveryRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'covey-notification-delivery-${Environment}'
      Description: 'Friday 9 AM notification delivery (FCM + SES)'
      ScheduleExpression: 'cron(0 14 ? * FRI *)'
      State: ENABLED
      Targets:
        - Arn: !Ref LambdaFunctionArn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn
          Id: NotificationDeliveryTarget
          Input: '{"triggerType":"NOTIFICATION_DELIVERY"}'
          RetryPolicy:
            MaximumEventAgeInSeconds: 7200
            MaximumRetryAttempts: 1

  NotificationDeliveryLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunctionArn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt NotificationDeliveryRule.Arn

  # ============================================
  # CloudWatch Alarms
  # ============================================

  WeeklyJobErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'covey-weekly-job-errors-${Environment}'
      AlarmDescription: 'Alert when weekly job Lambda has errors'
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Sub 'covey-weekly-spot-${Environment}'
      TreatMissingData: notBreaching

  WeeklyJobThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'covey-weekly-job-throttle-${Environment}'
      AlarmDescription: 'Alert when weekly job Lambda is throttled'
      MetricName: Throttles
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Sub 'covey-weekly-spot-${Environment}'
      TreatMissingData: notBreaching

  # ============================================
  # CloudWatch Dashboard
  # ============================================

  WeeklyJobDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub 'covey-weekly-job-${Environment}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "covey-weekly-spot-${Environment}", { "stat": "Sum", "label": "Invocations" } ],
                  [ ".", "Errors", ".", ".", { "stat": "Sum", "label": "Errors" } ],
                  [ ".", "Duration", ".", ".", { "stat": "Average", "label": "Duration (ms)" } ],
                  [ ".", "Throttles", ".", ".", { "stat": "Sum", "label": "Throttles" } ]
                ],
                "period": 300,
                "region": "${AWS::Region}",
                "title": "covey-weekly-spot Lambda Metrics",
                "view": "timeSeries"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/lambda/covey-weekly-spot-${Environment}' | fields @timestamp, @message | filter @message like /triggerType/ or @message like /ERROR/ or @message like /completed/ | sort @timestamp desc | limit 50",
                "region": "${AWS::Region}",
                "title": "Recent Job Executions",
                "view": "table"
              }
            }
          ]
        }

Outputs:
  SelectionRuleArn:
    Description: ARN of the weekly selection EventBridge rule
    Value: !GetAtt WeeklySelectionRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-SelectionRuleArn'

  DeliveryRuleArn:
    Description: ARN of the notification delivery EventBridge rule
    Value: !GetAtt NotificationDeliveryRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DeliveryRuleArn'

  DashboardURL:
    Description: CloudWatch Dashboard URL
    Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=covey-weekly-job-${Environment}'
