name: Test

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'ios/**'
      - '.github/workflows/test.yml'

jobs:
  backend-test:
    runs-on: ubuntu-latest
    name: Backend Tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Run backend linting
        run: cd backend && gradle checkstyleMain

      - name: Run all backend tests (unit + integration)
        run: cd backend && gradle allTests -Dnet.bytebuddy.experimental=true

