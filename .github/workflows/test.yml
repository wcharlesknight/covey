name: Test

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'ios/**'
      - '.github/workflows/test.yml'

jobs:
  backend-test:
    runs-on: ubuntu-latest
    name: Backend Tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Run backend linting
        run: cd backend && gradle checkstyleMain

      - name: Run all backend tests (unit + integration)
        run: cd backend && gradle allTests -Dnet.bytebuddy.experimental=true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/build/reports/tests/
          retention-days: 30

  ios-test:
    runs-on: ubuntu-latest
    name: React Native Tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'ios/package-lock.json'

      - name: Install dependencies
        run: |
          cd ios
          npm install

      - name: Run TypeScript type checking
        run: |
          cd ios
          npm run type-check
        continue-on-error: false

      - name: Run ESLint
        run: |
          cd ios
          npm run lint
        continue-on-error: true

      - name: Run Jest unit tests
        run: |
          cd ios
          npm test -- --coverage --passWithNoTests
        timeout-minutes: 15
        continue-on-error: false

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./ios/coverage/lcov.info
          flags: ios
          fail_ci_if_error: false

  lint-commits:
    runs-on: ubuntu-latest
    name: Lint Commits
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v5
        with:
          configFile: .commitlintrc.json
        continue-on-error: true

  secrets-scan:
    runs-on: ubuntu-latest
    name: Scan for Secrets
    steps:
      - uses: actions/checkout@v4

      - name: TruffleHog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true
