name: Deploy to Nonprod

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'ios/**'
      - 'infrastructure/**'
      - '.github/workflows/deploy-nonprod.yml'

env:
  AWS_REGION: us-west-2
  FIREBASE_PROJECT_ID: covey-dev

jobs:
  deploy-backend-nonprod:
    runs-on: ubuntu-latest
    name: Deploy Backend to Nonprod
    environment: nonprod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Build backend and create Lambda package
        run: cd backend && gradle build createLambdaZip -x test

      - name: Upload Lambda package to S3
        run: |
          BUCKET="covey-lambda-deployments-dev"
          TIMESTAMP=$(date +%s)
          S3_KEY="covey-lambda-${TIMESTAMP}.zip"

          # Upload to S3 (bucket must exist and be created manually beforehand)
          aws s3 cp backend/build/distributions/covey-lambda.zip "s3://$BUCKET/$S3_KEY"

          echo "LAMBDA_S3_BUCKET=$BUCKET" >> $GITHUB_ENV
          echo "LAMBDA_S3_KEY=$S3_KEY" >> $GITHUB_ENV

      - name: Deploy Lambda function code from S3
        run: |
          aws lambda update-function-code \
            --function-name covey-weekly-spot-dev \
            --s3-bucket ${{ env.LAMBDA_S3_BUCKET }} \
            --s3-key ${{ env.LAMBDA_S3_KEY }} \
            --region ${{ env.AWS_REGION }}

          # Wait for update to complete
          aws lambda wait function-updated \
            --function-name covey-weekly-spot-dev \
            --region ${{ env.AWS_REGION }}

      - name: Configure Lambda runtime and handler
        run: |
          aws lambda update-function-configuration \
            --function-name covey-weekly-spot-dev \
            --runtime java17 \
            --handler com.covey.LambdaRouter::handleRequest \
            --region ${{ env.AWS_REGION }}

      - name: Verify Lambda deployment
        run: |
          aws lambda get-function \
            --function-name covey-weekly-spot-dev \
            --region ${{ env.AWS_REGION }} \
            --query 'Configuration.[FunctionName,Runtime,CodeSha256,LastModified]' \
            --output text

      - name: Deploy EventBridge infrastructure (CloudFormation)
        run: |
          # Get Lambda function ARNs for the CloudFormation parameters
          WEEKLY_JOB_ARN=$(aws lambda get-function \
            --function-name covey-weekly-spot-dev \
            --region ${{ env.AWS_REGION }} \
            --query 'Configuration.FunctionArn' \
            --output text)

          NOTIFICATION_ARN=$(aws lambda get-function \
            --function-name covey-notification-delivery-dev \
            --region ${{ env.AWS_REGION }} \
            --query 'Configuration.FunctionArn' \
            --output text 2>/dev/null || echo "arn:aws:lambda:${{ env.AWS_REGION }}:${{ secrets.AWS_ACCOUNT_ID }}:function:covey-notification-delivery-dev")

          echo "Deploying EventBridge infrastructure..."
          echo "Weekly Job Lambda ARN: $WEEKLY_JOB_ARN"
          echo "Notification Lambda ARN: $NOTIFICATION_ARN"

          # Validate template
          aws cloudformation validate-template \
            --template-body file://infrastructure/eventbridge-weekly-job.yaml \
            --region ${{ env.AWS_REGION }}

          # Deploy stack
          aws cloudformation deploy \
            --template-file infrastructure/eventbridge-weekly-job.yaml \
            --stack-name covey-weekly-job-dev \
            --parameter-overrides \
              Environment=dev \
              LambdaFunctionArn=$WEEKLY_JOB_ARN \
              NotificationLambdaFunctionArn=$NOTIFICATION_ARN \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

          echo "✅ EventBridge infrastructure deployed successfully"

      - name: Get API Gateway endpoint
        id: api_gateway
        run: |
          # API Gateway endpoint for dev stage
          # This routes requests to the Lambda function via API Gateway
          echo "LAMBDA_ENDPOINT=https://lal06351qg.execute-api.us-west-2.amazonaws.com/dev" >> $GITHUB_OUTPUT

      - name: Generate Firebase test token
        id: firebase_token
        run: |
          cd backend
          # Build the smoke test classes and get classpath
          gradle compileSmokeTestJava -x test

          # Get classpath for running the token generator
          CLASSPATH=$(gradle -q printClasspath)

          # Generate test token using the utility
          TOKEN=$(java -cp "$CLASSPATH:build/classes/java/smokeTest:build/classes/java/main" \
            com.covey.smoke.FirebaseTestTokenGenerator smoke-test-user)
          echo "FIREBASE_TOKEN=$TOKEN" >> $GITHUB_OUTPUT
        env:
          FIREBASE_CREDENTIALS_SECRET: covey/firebase-admin-dev

      - name: Run smoke tests against nonprod API Gateway
        run: |
          cd backend
          gradle smokeTest \
            -Denv=dev
        env:
          LAMBDA_ENDPOINT: ${{ steps.api_gateway.outputs.LAMBDA_ENDPOINT }}
          FIREBASE_TEST_TOKEN: ${{ steps.firebase_token.outputs.FIREBASE_TOKEN }}
        continue-on-error: true

      - name: Upload smoke test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-reports
          path: backend/build/reports/
          retention-days: 30
          if-no-files-found: warn


  deploy-ios-testflight:
    runs-on: macos-latest
    name: Deploy iOS to TestFlight (EAS)
    environment: nonprod
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'ios/package-lock.json'

      - name: Install dependencies
        run: |
          cd ios
          npm install

      - name: Set up EAS CLI
        run: npm install -g eas-cli

      - name: Build for TestFlight with EAS
        run: |
          cd ios
          eas build --platform ios --profile preview
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to TestFlight
        run: |
          cd ios
          eas submit --platform ios --latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

  update-planning-state:
    runs-on: ubuntu-latest
    name: Update Planning State
    needs: [ deploy-backend-nonprod, deploy-ios-testflight ]
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Update deployment timestamp
        run: |
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "Last nonprod deployment: $TIMESTAMP" >> $GITHUB_STEP_SUMMARY
