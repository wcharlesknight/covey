plugins {
    id 'java'
    id 'checkstyle'
    id 'jacoco'
    id 'org.owasp.dependencycheck' version '8.4.2'
}

group = 'com.covey'
version = '0.1.0'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
}

dependencies {
    // Firebase Admin SDK
    implementation 'com.google.firebase:firebase-admin:9.2.0'

    // AWS Lambda
    implementation 'com.amazonaws:aws-lambda-java-core:1.2.3'
    implementation 'com.amazonaws:aws-lambda-java-events:3.11.4'

    // JSON processing
    implementation 'com.google.code.gson:gson:2.10.1'

    // Google Auth (for Firebase token verification)
    implementation 'com.google.auth:google-auth-library-oauth2-http:1.11.0'

    // AWS Secrets Manager (for loading Firebase credentials)
    implementation 'software.amazon.awssdk:secretsmanager:2.24.0'

    // gRPC dependencies - use shaded netty for Lambda to prevent runtime classpath conflicts
    implementation 'io.grpc:grpc-netty-shaded:1.55.1'
    implementation 'io.grpc:grpc-protobuf:1.55.1'
    implementation 'io.grpc:grpc-services:1.55.1'

    // Testing
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:5.11.0'
    testImplementation 'net.bytebuddy:byte-buddy:1.15.10'

    // HTTP client for integration tests
    testImplementation 'com.squareup.okhttp3:okhttp:4.11.0'
}

checkstyle {
    toolVersion = '10.12.0'
    configFile = file("${rootDir}/checkstyle.xml")
}

sourceSets {
    smokeTest {
        java.srcDir 'src/smokeTest/java'
        compileClasspath += sourceSets.main.output
        runtimeClasspath += sourceSets.main.output
    }
}

configurations {
    smokeTestImplementation.extendsFrom testImplementation
    smokeTestRuntimeOnly.extendsFrom testRuntimeOnly
}

test {
    useJUnit()
    jacoco {
        destinationFile = file("${buildDir}/jacoco/test.exec")
    }
    jvmArgs = ['-Dnet.bytebuddy.experimental=true']
    excludes = ['com/covey/integration/**Test.class', '**/integration/**Test.class', 'com/covey/smoke/**Test.class']
}

task integrationTest(type: Test) {
    useJUnit()
    testLogging {
        events "passed", "skipped", "failed"
    }
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    includes = ['com/covey/integration/*Test.class', '**/integration/**Test.class']
    description = 'Run integration tests'
    group = 'verification'
}

// Run both unit and integration tests
task allTests {
    dependsOn test, integrationTest
    description = 'Run all unit and integration tests'
    group = 'verification'
}

jacocoTestReport {
    dependsOn test
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: ['**/config/**'])
        }))
    }
}

task mergeServiceFiles {
    outputs.dir("${buildDir}/merged-services")

    doLast {
        def servicesDir = file("${buildDir}/merged-services/META-INF/services")
        servicesDir.deleteDir()
        servicesDir.mkdirs()

        configurations.runtimeClasspath.each { f ->
            if (f.name.endsWith('.jar')) {
                try {
                    def zip = new java.util.zip.ZipFile(f)
                    zip.entries().each { entry ->
                        if (entry.name.startsWith('META-INF/services/') && !entry.isDirectory()) {
                            def serviceName = entry.name - 'META-INF/services/'
                            def serviceFile = new File(servicesDir, serviceName)
                            def content = zip.getInputStream(entry).text

                            if (serviceFile.exists()) {
                                serviceFile.append('\n' + content)
                            } else {
                                serviceFile.text = content
                            }
                        }
                    }
                    zip.close()
                } catch (Exception e) {
                    println "Warning: Could not process JAR ${f.name}: ${e.message}"
                }
            }
        }
    }
}

task fatJar(type: Jar) {
    dependsOn mergeServiceFiles
    archiveFileName = 'covey-lambda.jar'

    from sourceSets.main.output

    from {
        configurations.runtimeClasspath.collect { file ->
            file.isDirectory() ? file : zipTree(file)
        }
    } {
        exclude 'META-INF/services/**'
    }

    from mergeServiceFiles.outputs

    manifest {
        attributes 'Main-Class': 'com.covey.App'
    }

    duplicatesStrategy = DuplicatesStrategy.WARN
}

task createLambdaZip(type: Zip) {
    dependsOn fatJar
    archiveFileName = 'covey-lambda.zip'
    destinationDirectory = file('build/distributions')

    from zipTree(fatJar.archiveFile)
    from(file('bootstrap')) {
        into '/'
    }

    doFirst {
        file('build/distributions').mkdirs()
    }
}

task smokeTest(type: Test) {
    useJUnit()
    testClassesDirs = sourceSets.smokeTest.output.classesDirs
    classpath = sourceSets.smokeTest.runtimeClasspath
    jvmArgs = ['-Dnet.bytebuddy.experimental=true']
    description = 'Run smoke tests against deployed Lambda'
    group = 'verification'
}

task printClasspath {
    doLast {
        println sourceSets.smokeTest.runtimeClasspath.asPath
    }
}
